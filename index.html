<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard ✨</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:   '#fffef7',
            paper:   '#fafaf2',
            green: {
              light: '#d4edda',
              soft:  '#b8dfc4',
              mid:   '#7ec99a',
              dark:  '#3a8f5c',
            },
            yellow: {
              light: '#fff9c4',
              soft:  '#fff176',
              mid:   '#f9d84a',
              dark:  '#c8a000',
            },
            ink:     '#2d3a2e',
            inksoft: '#5a6b5c',
          },
          fontFamily: {
            hand: ['"Caveat"', 'cursive'],
            body: ['"Nunito"', 'sans-serif'],
          },
          keyframes: {
            wiggle:    { '0%,100%': { transform: 'rotate(-2deg)' }, '50%': { transform: 'rotate(2deg)' } },
            floatUp:   { '0%,100%': { transform: 'translateY(0px) rotate(-1deg)' }, '50%': { transform: 'translateY(-8px) rotate(1deg)' } },
            popIn:     { '0%': { transform: 'scale(0.8) rotate(-3deg)', opacity: '0' }, '100%': { transform: 'scale(1) rotate(0deg)', opacity: '1' } },
            slideDown: { '0%': { transform: 'translateY(-10px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
            stamp:     { '0%': { transform: 'scale(1.4) rotate(-5deg)', opacity: '0' }, '60%': { transform: 'scale(0.95) rotate(1deg)' }, '100%': { transform: 'scale(1) rotate(0deg)', opacity: '1' } },
            shake:     { '0%,100%': { transform: 'translateX(0)' }, '20%': { transform: 'translateX(-4px) rotate(-1deg)' }, '40%': { transform: 'translateX(4px) rotate(1deg)' }, '60%': { transform: 'translateX(-3px)' }, '80%': { transform: 'translateX(3px)' } },
            pulse2:    { '0%,100%': { boxShadow: '0 0 0 0 rgba(126,201,154,0.5)' }, '50%': { boxShadow: '0 0 0 8px rgba(126,201,154,0)' } },
          },
          animation: {
            wiggle:    'wiggle 3s ease-in-out infinite',
            floatUp:   'floatUp 4s ease-in-out infinite',
            popIn:     'popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards',
            slideDown: 'slideDown 0.3s ease forwards',
            stamp:     'stamp 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards',
            shake:     'shake 0.4s ease',
            pulse2:    'pulse2 2s ease-in-out infinite',
          },
          boxShadow: {
            scrap:  '3px 3px 0 #b8dfc4, 6px 6px 0 rgba(0,0,0,0.06)',
            scrapY: '3px 3px 0 #fff176, 6px 6px 0 rgba(0,0,0,0.06)',
            tape:   '0 2px 8px rgba(0,0,0,0.12)',
            pin:    '2px 2px 6px rgba(0,0,0,0.25)',
          },
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-body bg-cream min-h-screen overflow-x-hidden">

  <!-- ░░ Animated canvas background ░░ -->
  <canvas id="bg-canvas" class="fixed inset-0 w-full h-full pointer-events-none" style="z-index:0"></canvas>

  <!-- ░░ Top bar ░░ -->
  <header class="relative z-50 flex items-center justify-between px-6 py-3
                 bg-white/80 backdrop-blur-sm border-b-2 border-green-soft
                 shadow-sm">
    <span class="font-hand text-2xl font-bold text-green-dark tracking-wide select-none">
      📌 my dashboard
    </span>
    <button id="btn-theme-toggle"
            class="group flex items-center gap-2 px-4 py-1.5 rounded-full
                   bg-yellow-light border-2 border-yellow-mid font-hand text-base font-semibold text-ink
                   shadow-scrapY transition-all duration-200
                   hover:scale-110 hover:rotate-2 hover:bg-yellow-soft active:scale-95"
            aria-label="Toggle light/dark mode">
      ☀️ Light
    </button>
  </header>

  <!-- ░░ Main grid ░░ -->
  <main class="relative z-10 dashboard-grid px-4 py-8 sm:px-8 max-w-6xl mx-auto">

    <!-- ── Greeting Widget ── -->
    <section id="greeting-widget"
             class="widget col-span-full bg-white border-2 border-green-soft rounded-2xl p-6 sm:p-8
                    shadow-scrap rotate-[-0.4deg] hover:rotate-0
                    transition-all duration-300 hover:scale-[1.01] hover:shadow-xl
                    relative overflow-hidden">
      <!-- tape strip top -->
      <div class="tape tape-top-left"></div>
      <div class="tape tape-top-right"></div>

      <p id="clock"
         class="font-hand text-5xl sm:text-7xl font-bold text-green-dark tabular-nums
                drop-shadow-sm transition-all duration-300"></p>
      <p id="date-display"
         class="font-hand text-xl text-inksoft mt-1"></p>
      <h1 id="greeting-message"
          class="font-hand text-3xl sm:text-4xl font-bold text-ink mt-2
                 transition-all duration-300"></h1>

      <div class="name-input-row flex gap-2 justify-center mt-4 flex-wrap">
        <input type="text" id="name-input"
               placeholder="✏️ your name…"
               maxlength="40"
               aria-label="Your name"
               class="scrap-input text-center max-w-[200px]">
        <button id="btn-save-name"
                class="scrap-btn bg-green-light border-green-soft hover:bg-green-soft">
          Save ✓
        </button>
      </div>
    </section>

    <!-- ── Timer Widget ── -->
    <section id="timer-widget"
             class="widget bg-yellow-light border-2 border-yellow-mid rounded-2xl p-6
                    shadow-scrapY rotate-[0.5deg] hover:rotate-0
                    transition-all duration-300 hover:scale-[1.02] hover:shadow-xl
                    flex flex-col items-center gap-4 relative overflow-hidden">
      <div class="tape tape-top-center"></div>

      <h2 class="font-hand text-2xl font-bold text-ink tracking-wide">⏱ Focus Timer</h2>

      <p id="timer-display"
         class="font-hand text-6xl sm:text-7xl font-bold text-ink tabular-nums
                transition-all duration-200 select-none">25:00</p>

      <div class="timer-controls flex gap-3 flex-wrap justify-center">
        <button id="btn-start"
                class="scrap-btn bg-green-light border-green-soft hover:bg-green-soft hover:scale-110 hover:rotate-1">
          ▶ Start
        </button>
        <button id="btn-stop"
                class="scrap-btn bg-white border-green-soft hover:bg-green-light hover:scale-110 hover:-rotate-1">
          ⏸ Stop
        </button>
        <button id="btn-reset"
                class="scrap-btn bg-white border-yellow-mid hover:bg-yellow-soft hover:scale-110 hover:rotate-1">
          ↺ Reset
        </button>
      </div>
    </section>

    <!-- ── To-Do Widget ── -->
    <section id="todo-widget"
             class="widget bg-white border-2 border-green-soft rounded-2xl p-6
                    shadow-scrap rotate-[-0.3deg] hover:rotate-0
                    transition-all duration-300 hover:scale-[1.01] hover:shadow-xl
                    flex flex-col gap-3 relative overflow-hidden">
      <div class="tape tape-top-left"></div>

      <h2 class="font-hand text-2xl font-bold text-ink">📝 To-Do</h2>

      <div class="todo-input-row flex gap-2">
        <input type="text" id="todo-input"
               placeholder="Add a task…"
               aria-label="New task description"
               class="scrap-input flex-1 min-w-0">
        <button id="btn-add-task"
                class="scrap-btn bg-green-light border-green-soft hover:bg-green-soft hover:scale-110 hover:rotate-1 flex-shrink-0">
          + Add
        </button>
      </div>

      <p id="todo-error"
         class="error-message font-hand text-base text-red-500 hidden"
         role="alert" aria-live="polite"></p>

      <ul id="task-list" class="flex flex-col gap-2 mt-1"></ul>
    </section>

    <!-- ── Quick Links Widget ── -->
    <section id="links-widget"
             class="widget bg-yellow-light border-2 border-yellow-mid rounded-2xl p-6
                    shadow-scrapY rotate-[0.3deg] hover:rotate-0
                    transition-all duration-300 hover:scale-[1.01] hover:shadow-xl
                    flex flex-col gap-3 relative overflow-hidden">
      <div class="tape tape-top-right"></div>

      <h2 class="font-hand text-2xl font-bold text-ink">🔗 Quick Links</h2>

      <div class="links-input-row flex gap-2 flex-wrap">
        <input type="text" id="link-label-input"
               placeholder="Label"
               aria-label="Link label"
               class="scrap-input flex-1 min-w-[90px]">
        <input type="url" id="link-url-input"
               placeholder="https://…"
               aria-label="Link URL"
               class="scrap-input flex-1 min-w-[120px]">
        <button id="btn-add-link"
                class="scrap-btn bg-white border-yellow-mid hover:bg-yellow-soft hover:scale-110 hover:rotate-1 flex-shrink-0">
          + Add
        </button>
      </div>

      <p id="links-error"
         class="error-message font-hand text-base text-red-500 hidden"
         role="alert" aria-live="polite"></p>

      <div id="links-list" class="flex flex-col gap-2 mt-1"></div>
    </section>

  </main>

  <script src="js/app.js" defer></script>
</body>
</html>
